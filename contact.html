<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | AURA AI AGENCY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #0a0a0a; --card: #111; --whatsapp: #25D366; --gmail: #DB4437; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 100px; }
        
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--neon); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; }
        .nav-links a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon); }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .header-full { grid-column: 1 / -1; text-align: center; margin-bottom: 30px; }
        #page-title { font-size: 3rem; color: var(--neon); margin: 0; text-transform: uppercase; }
        #page-img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin-top: 20px; border: 1px solid #333; }

        .direct-links { display: flex; flex-direction: column; gap: 20px; }
        .connect-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .btn { display: inline-block; width: 80%; padding: 15px; margin: 10px 0; border-radius: 8px; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s; border: none; cursor: pointer; }
        
        .btn-wa { background: var(--whatsapp); color: white; box-shadow: 0 0 15px rgba(37, 211, 102, 0.3); }
        .btn-wa:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--whatsapp); }
        
        .btn-gm { background: var(--gmail); color: white; box-shadow: 0 0 15px rgba(219, 68, 55, 0.3); }
        .btn-gm:hover { transform: scale(1.05); box-shadow: 0 0 25px var(--gmail); }

        .form-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .send-btn { background: var(--neon); color: black; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } #page-title { font-size: 2rem; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">AURA AI</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html" style="color: var(--neon);">Contact</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header-full">
            <h1 id="page-title">ESTABLISH UPLINK</h1>
            <p id="page-desc" style="color: #666;">Secure line to the Chief Architect.</p>
            <img id="page-img" src="https://images.unsplash.com/photo-1423666639041-f56000c27a9a?q=80&w=1200" alt="Connect">
        </div>

        <div class="direct-links">
            <div class="connect-card">
                <h2 style="color: var(--neon);">Direct Channels</h2>
                <p style="color: #888; margin-bottom: 30px;">Choose your communication protocol.</p>
                
                <!-- WhatsApp Link - Updated Number -->
                <a href="https://wa.me/918619436849" target="_blank" class="btn btn-wa">Open WhatsApp Chat</a>
                
                <!-- Gmail Link - Updated Email -->
                <a href="mailto:Cjeetendra479@gmail.com" class="btn btn-gm">Official Email Link</a>
            </div>
        </div>

        <div class="form-card">
            <h2 style="margin-top: 0;">Transmission Form</h2>
            <input type="text" placeholder="Identity Name">
            <input type="email" placeholder="Return Address (Email)">
            <textarea rows="5" placeholder="Data Transmission Details..."></textarea>
            <button class="send-btn">Send Signal</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCBk6Nz1cd4A0x7wOnLG2-eNw2Y98-75-U",
          authDomain: "aura-ai-agency.firebaseapp.com",
          projectId: "aura-ai-agency",
          storageBucket: "aura-ai-agency.appspot.com",
          messagingSenderId: "859076065133",
          appId: "1:859076065133:web:f6078dabf975bf01280c64",
          measurementId: "G-0MRWWPVZTM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function syncContact() {
            try {
                const snapshot = await db.collection('contact_data').get();
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    if(data.title) document.getElementById('page-title').innerText = data.title;
                    if(data.description) document.getElementById('page-desc').innerText = data.description;
                    if(data.imageUrl) document.getElementById('page-img').src = data.imageUrl;
                }
            } catch (e) { console.log("System stable in offline state."); }
        }
        syncContact();
    </script>
</body>
</html>
