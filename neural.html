<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Networks | AURA AI</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding-top: 100px; text-align: center; }
        .hero { padding: 50px; border: 1px solid #222; max-width: 800px; margin: 0 auto; border-radius: 20px; }
        h1 { color: var(--neon); letter-spacing: 5px; text-transform: uppercase; }
        .node-container { display: flex; justify-content: center; gap: 50px; margin-top: 50px; }
        .node { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon); box-shadow: 0 0 15px var(--neon); }
        .line { height: 2px; width: 50px; background: #333; align-self: center; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 id="page-title">NEURAL ARCHITECTURE</h1>
        <p id="page-desc">Processing data through multi-layered artificial synapses.</p>
        
        <!-- Simple Visual Representation -->
        <div class="node-container">
            <div class="node"></div>
            <div class="line"></div>
            <div class="node" style="border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff;"></div>
            <div class="line"></div>
            <div class="node"></div>
        </div>
    </div>
</body>
</html>
