<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POWER TECH ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .panel { background: #111; padding: 30px; border-radius: 15px; border: 1px solid #00f2ff; width: 400px; }
        input, textarea { width: 100%; margin: 10px 0; padding: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #00f2ff; color: black; font-weight: bold; border: none; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>POWER TECH CONTROL</h2>
        <input type="text" id="t" placeholder="New Website Title">
        <textarea id="d" rows="5" placeholder="New Description"></textarea>
        <button onclick="save()">UPDATE WEBSITE LIVE</button>
        <p id="msg" style="color: lime;"></p>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCBk6Nz1cd4A0x7wOnLG2-eNw2Y98-75-U", projectId: "aura-ai-agency" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function save() {
            await db.collection('index_data').doc('master_data').set({
                title: document.getElementById('t').value,
                description: document.getElementById('d').value
            }, {merge: true});
            document.getElementById('msg').innerText = "✅ Updated Successfully!";
        }
    </script>
</body>
</html>
