<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | AURA AI</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; --accent: #7000ff; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 80px; }
        
        /* Navbar */
        .navbar { position: fixed; top: 0; width: 100%; background: #000; border-bottom: 2px solid var(--neon); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; }
        .logo { font-size: 1.2rem; font-weight: bold; color: var(--neon); text-transform: uppercase; }
        
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        h1 { text-align: center; color: var(--neon); text-transform: uppercase; letter-spacing: 3px; }

        /* Sidebar/Grid for 13 Folders */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .folder-btn { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 12px; cursor: pointer; text-align: center; border-radius: 5px; transition: 0.3s; font-size: 12px; text-transform: uppercase; }
        .folder-btn:hover, .folder-btn.active { background: var(--accent); color: white; border-color: var(--neon); box-shadow: 0 0 10px var(--accent); }

        /* Editor Box */
        .editor-box { background: var(--card); border: 1px solid #222; padding: 30px; border-radius: 15px; display: none; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        label { display: block; margin-bottom: 8px; color: var(--neon); font-size: 12px; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--neon); outline: none; }
