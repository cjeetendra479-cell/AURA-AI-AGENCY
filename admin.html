<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AURA AI // ADMIN TERMINAL</title>
    <style>
        body { background: #050509; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .panel { background: #0b0b14; padding: 30px; border-radius: 12px; border: 1px solid #2563eb; width: 400px; }
        h2 { color: #2563eb; text-transform: uppercase; font-style: italic; }
        input, textarea { width: 100%; background: #000; border: 1px solid #1a1a1a; color: white; padding: 10px; margin: 10px 0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        #status { margin-top: 15px; font-size: 12px; text-align: center; }
    </style>
</head>
<body>
    <div class="panel">
        <h2>Control Center</h2>
        <p style="font-size: 10px; color: #666;">UPDATE HOME PAGE CONTENT LIVE</p>
        
        <input type="text" id="mainTitle" placeholder="Title (e.g. THE <br> REVOLUTION.)">
        <textarea id="mainDesc" rows="4" placeholder="Description Text..."></textarea>
        
        <button onclick="updateLive()">PUBLISH LIVE CHANGES</button>
        <div id="status"></div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // YE CONFIG FIXED HAI - ISSE CHANGE MAT KARNA
        const firebaseConfig = {
            apiKey: "AIzaSyAs-DEMO-KEY", 
            authDomain: "aura-ai-project.firebaseapp.com",
            projectId: "aura-ai-project", // Yahan apna Project ID check kar lena agar change kiya ho
            storageBucket: "aura-ai-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcde"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function updateLive() {
            const title = document.getElementById('mainTitle').value;
            const desc = document.getElementById('mainDesc').value;
            const status = document.getElementById('status');

            status.innerText = "Connecting to Neural Link...";

            db.collection("content").doc("homepage").set({
                title: title,
                description: desc,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => {
                status.style.color = "#4ade80";
                status.innerText = "✅ DEPLOYED SUCCESSFULLY!";
            })
            .catch((error) => {
                status.style.color = "#ff4a4a";
                status.innerText = "❌ ERROR: " + error.message;
            });
        }
    </script>
</body>
</html>
