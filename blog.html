<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insights | AURA Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #3b82f6, #9333ea); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav class="fixed top-0 w-full z-[100] glass py-4 px-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase gradient-text">Aura-AI</h1>
            <div class="flex gap-5 text-[10px] font-bold uppercase tracking-[0.2em] text-zinc-400 overflow-x-auto whitespace-nowrap px-4">
                <a href="index.html" class="hover:text-white">Home</a>
                <a href="blog.html" class="text-blue-500 border-b border-blue-500 pb-1">Blog</a>
                <a href="admin.html" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[9px]">Admin</a>
            </div>
        </div>
    </nav>

    <!-- BLOG HERO -->
    <section class="pt-40 pb-20 px-6 text-center">
        <h2 class="text-5xl md:text-7xl font-black uppercase italic mb-6 leading-tight">Latest <span class="gradient-text">Insights</span></h2>
        <p class="text-zinc-500 max-w-xl mx-auto font-medium text-sm">Discover how AI and No-Code tools are changing the digital landscape of India.</p>
    </section>

    <!-- BLOG LIST -->
    <section class="max-w-7xl mx-auto px-6 pb-32">
        <div id="blog-container" class="grid grid-cols-1 md:grid-cols-2 gap-12">
            <!-- Blogs load here -->
            <p class="text-zinc-600 animate-pulse uppercase tracking-widest text-[10px]">Fetching latest stories...</p>
        </div>
    </section>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBK6Nz1cd4A0x7wOnLG2-eNVfDzSgDfXo",
            authDomain: "aura-ai-agency.firebaseapp.com",
            projectId: "aura-ai-agency",
            storageBucket: "aura-ai-agency.firebasestorage.app",
            messagingSenderId: "859076065133",
            appId: "1:859076065133:web:f6078dabf975bf01280c64",
            measurementId: "G-0MRWWPVZTM"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadBlogs() {
            const container = document.getElementById('blog-container');
            try {
                const snapshot = await db.collection("blogs").orderBy("time", "desc").get();
                container.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const blogHTML = `
                        <div class="group cursor-pointer">
                            <div class="relative overflow-hidden rounded-[2.5rem] mb-6 aspect-video">
                                <img src="${data.imageUrl}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-700">
                                <div class="absolute top-4 left-4 bg-black/50 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-bold uppercase border border-white/10">Tech News</div>
                            </div>
                            <h3 class="text-2xl font-black italic uppercase mb-3 group-hover:text-blue-500 transition-colors">${data.title}</h3>
                            <p class="text-zinc-500 text-sm leading-relaxed line-clamp-3 mb-4">${data.content}</p>
                            <span class="text-blue-500 text-[10px] font-black uppercase tracking-widest border-b border-blue-500/20 pb-1">Read Article —></span>
                        </div>
                    `;
                    container.innerHTML += blogHTML;
                });
            } catch (e) { container.innerHTML = "Error loading blogs."; }
        }
        window.onload = loadBlogs;
    </script>
</body>
</html>
