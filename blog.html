<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | AURA AI AGENCY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #080808; --card: #121212; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-top: 90px; }
        
        /* Navbar Fixed */
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--neon); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; backdrop-filter: blur(5px); }
        .logo { font-weight: bold; color: var(--neon); letter-spacing: 2px; }
        .nav-links { list-style: none; display: flex; gap: 15px; margin: 0; padding: 0; overflow-x: auto; }
        .nav-links a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; }
        .nav-links a:hover { color: var(--neon); }
        .admin-btn { border: 1px solid var(--neon); padding: 5px 10px; border-radius: 4px; }

        /* Blog Layout */
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .blog-header { text-align: center; margin-bottom: 50px; }
        .blog-header h1 { font-size: 3rem; color: var(--neon); margin: 0; text-transform: uppercase; }
        
        .main-post { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
        .main-post:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        
        #page-img { width: 100%; height: 400px; object-fit: cover; border-bottom: 1px solid #222; }
        
        .post-content { padding: 30px; }
        .post-meta { color: var(--neon); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }
        #page-title { font-size: 2rem; margin: 10px 0; line-height: 1.2; }
        #page-desc { color: #aaa; line-height: 1.8; font-size: 1.1rem; }

        /* Loading Skeleton */
        .loading { text-align: center; color: #555; padding: 50px; font-style: italic; }

        @media (max-width: 600px) { #page-title { font-size: 1.5rem; } #page-img { height: 250px; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">AURA AI</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="blog.html" style="color: var(--neon);">Blog</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="admin.html" class="admin-btn">Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="blog-header">
            <span style="color: #444; letter-spacing: 5px;">INTEL & INSIGHTS</span>
            <h1>TECH JOURNAL</h1>
        </div>

        <div id="blog-loader" class="loading">Establishing uplink to database...</div>

        <article class="main-post" id="post-container" style="display: none;">
            <img id="page-img" src="" alt="Blog Cover">
            <div class="post-content">
                <span class="post-meta">Latest Update // Neural Network</span>
                <h2 id="page-title">Loading Title...</h2>
                <p id="page-desc">Synchronizing data nodes for full transmission...</p>
                <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #222; color: #555; font-size: 0.9rem;">
                    Published by: Aura AI Systems • 5 min read
                </div>
            </div>
        </article>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyCBk6Nz1cd4A0x7wOnLG2-eNw2Y98-75-U",
          authDomain: "aura-ai-agency.firebaseapp.com",
          projectId: "aura-ai-agency",
          storageBucket: "aura-ai-agency.appspot.com",
          messagingSenderId: "859076065133",
          appId: "1:859076065133:web:f6078dabf975bf01280c64",
          measurementId: "G-0MRWWPVZTM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadBlog() {
            try {
                const snapshot = await db.collection('blog_data').get();
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    
                    document.getElementById('page-title').innerText = data.title || "NO TITLE SET";
                    document.getElementById('page-desc').innerText = data.description || "No content available.";
                    document.getElementById('page-img').src = data.imageUrl || "https://via.placeholder.com/1200x600";
                    
                    document.getElementById('blog-loader').style.display = 'none';
                    document.getElementById('post-container').style.display = 'block';
                }
            } catch (error) {
                console.log("Error:", error);
                document.getElementById('blog-loader').innerText = "System Offline. Check Connection.";
            }
        }

        window.onload = loadBlog;
    </script>
</body>
</html>
