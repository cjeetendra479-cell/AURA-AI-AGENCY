<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA-AI | Core System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; margin: 0; }
        
        /* Sticky Navigation Bar */
        .nav-header { position: fixed; top: 0; width: 100%; z-index: 9999; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; justify-content: start; }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-link { color: #555; font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 10px 20px; border-radius: 50px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .nav-link.active { color: #fff; background: #3b82f6; box-shadow: 0 0 15px rgba(59,130,246,0.4); }

        /* Content Display */
        .content-section { display: none; padding: 180px 20px 100px; min-height: 100vh; animation: fadeIn 0.4s ease; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Image & Card Styling */
        .project-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 35px; padding: 20px; transition: 0.4s; }
        .project-card:hover { border-color: #3b82f6; transform: scale(1.02); }
        .img-container { width: 100%; height: 250px; border-radius: 25px; overflow: hidden; background: #111; margin-bottom: 20px; }
        .project-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
    </style>
</head>
<body>

    <!-- STICKY 13-BUTTON MENU -->
    <header class="nav-header">
        <div class="text-center pt-4"><h1 class="text-blue-500 font-black italic tracking-tighter text-2xl uppercase">Aura-AI</h1></div>
        <div class="nav-container">
            <div class="nav-link active" onclick="openTab(event, 'home')">Home</div>
            <div class="nav-link" onclick="openTab(event, 'about')">About</div>
            <div class="nav-link" onclick="openTab(event, 'services')">Services</div>
            <div class="nav-link" onclick="openTab(event, 'portfolio')">Portfolio</div>
            <div class="nav-link" onclick="openTab(event, 'labs')">Labs</div>
            <div class="nav-link" onclick="openTab(event, 'neural')">Neural-Nets</div>
            <div class="nav-link" onclick="openTab(event, 'team')">Team</div>
            <div class="nav-link" onclick="openTab(event, 'blog')">Blog</div>
            <div class="nav-link" onclick="openTab(event, 'faq')">FAQ</div>
            <div class="nav-link" onclick="openTab(event, 'pricing')">Pricing</div>
            <div class="nav-link" onclick="openTab(event, 'careers')">Careers</div>
            <div class="nav-link" onclick="openTab(event, 'contact')">Contact</div>
            <div class="nav-link" onclick="openTab(event, 'privacy')">Privacy</div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <!-- HOME SECTION -->
        <section id="home" class="content-section active">
            <div class="text-center mb-16">
                <h2 class="text-6xl font-black italic uppercase">System <span class="text-blue-600">Feed</span></h2>
            </div>
            <div id="project-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Data from Firebase will load here -->
                <p class="text-zinc-800 animate-pulse text-xs uppercase tracking-widest text-center col-span-full">Loading Nodes...</p>
            </div>
        </section>

        <!-- STATIC SECTIONS (So pages are never blank) -->
        <section id="about" class="content-section">
            <h2 class="text-5xl font-black italic text-blue-500 uppercase">The Agency</h2>
            <p class="text-zinc-500 mt-6 text-xl max-w-2xl">Aura-AI is a next-gen infrastructure for neural networks and digital assets.</p>
        </section>
        
        <section id="services" class="content-section"><h2 class="text-5xl font-black italic uppercase">Services</h2></section>
        <section id="portfolio" class="content-section"><h2 class="text-5xl font-black italic uppercase">Global Portfolio</h2></section>
        <section id="labs" class="content-section"><h2 class="text-5xl font-black italic uppercase text-zinc-800">Experimental Labs</h2></section>
        <section id="contact" class="content-section"><h2 class="text-5xl font-black italic uppercase">Let's Connect</h2></section>
        <!-- Add rest of the sections here as needed -->
    </main>

    <script>
        // TAB SWITCHER LOGIC
        function openTab(evt, tabName) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            evt.currentTarget.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCBK6Nz1cd4A0x7wOnLG2-eNVfDzSgDfXo",
            projectId: "aura-ai-agency",
            appId: "1:859076065133:web:f6078dabf975bf01280c64"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LOAD PROJECTS FROM FIREBASE
        function loadProjects() {
            const list = document.getElementById('project-list');
            
            db.collection("projects").onSnapshot((snap) => {
                if(snap.empty) {
                    list.innerHTML = "<p class='col-span-full text-center text-zinc-800'>No Projects Found.</p>";
                    return;
                }
                
                let html = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    
                    // CLEAN LINK LOGIC: Brackets remove karne ke liye
                    let cleanImg = d.imageUrl ? d.imageUrl.replace(/[\[\]]/g, "").trim() : "";
                    
                    // FALLBACK IMAGE: Agar link khali hai to ye techy image dikhegi
                    if(!cleanImg) cleanImg = "https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&q=80&w=800";

                    html += `
                        <div class="project-card">
                            <div class="img-container">
                                <img src="${cleanImg}" class="project-img" 
                                     onerror="this.src='https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=800'">
                            </div>
                            <h4 class="text-xl font-black italic uppercase text-white px-2">${d.title || 'Untitled Node'}</h4>
                            <p class="text-zinc-500 text-[10px] mt-2 px-2 font-bold uppercase tracking-widest">${d.description || 'Secure Deployment'}</p>
                        </div>
                    `;
                });
                list.innerHTML = html;
            });
        }

        window.onload = loadProjects;
    </script>
</body>
</html>
