<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POWER TECH HUB // GLOBAL</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --glow: rgba(0, 242, 255, 0.5); --bg: #05070a; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* THEME: NO COPY TECH */
        .bg-layer { position: fixed; top: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #101a26 0%, #05070a 100%); z-index: -1; }
        
        .header { margin-top: 40px; text-align: center; }
        .header h1 { font-size: 2.5rem; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 20px var(--glow); margin: 10px; }
        
        /* 13 BUTTONS GRID - ALL ON SCREEN */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            margin: 40px auto;
            justify-content: center;
        }

        .tech-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 242, 255, 0.3);
            color: white;
            padding: 20px 10px;
            text-align: center;
            text-decoration: none;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .tech-btn:hover { background: var(--neon); color: black; box-shadow: 0 0 30px var(--neon); transform: translateY(-5px); }

        /* UNIQUE IMAGES SECTION (4 PICS) */
        .image-cluster {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 600px;
            margin-bottom: 50px;
        }
        .img-card { width: 100%; height: 150px; border-radius: 12px; object-fit: cover; border: 2px solid #1a222d; pointer-events: none; user-select: none; }

        @media (max-width: 600px) { .grid-container { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    
    <div class="header">
        <h1 id="site-title">POWER TECH HUB</h1>
        <p id="site-desc">Next-Gen Technology Reselling Node</p>
    </div>

    <!-- ALL 13 BUTTONS IN CENTER -->
    <div class="grid-container">
        <a href="index.html" class="tech-btn" style="border-color: var(--neon);">Home</a>
        <a href="about.html" class="tech-btn">About</a>
        <a href="services.html" class="tech-btn">Services</a>
        <a href="portfolio.html" class="tech-btn">Portfolio</a>
        <a href="pricing.html" class="tech-btn">Pricing</a>
        <a href="team.html" class="tech-btn">Team</a>
        <a href="labs.html" class="tech-btn">Labs</a>
        <a href="faq.html" class="tech-btn">FAQ</a>
        <a href="blog.html" class="tech-btn">Blog</a>
        <a href="contact.html" class="tech-btn">Contact</a>
        <a href="admin.html" class="tech-btn" style="background: #ff0055; border: none;">Admin</a>
        <a href="neural.html" class="tech-btn">Neural</a>
        <a href="privacy.html" class="tech-btn">Privacy</a>
    </div>

    <!-- 4 UNIQUE AI TECH PICS -->
    <div class="image-cluster">
        <img class="img-card" src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&w=400" alt="T1">
        <img class="img-card" src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=400" alt="T2">
        <img class="img-card" src="https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=400" alt="T3">
        <img class="img-card" src="https://images.unsplash.com/photo-1639322537228-f710d846310a?auto=format&fit=crop&w=400" alt="T4">
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCBk6Nz1cd4A0x7wOnLG2-eNw2Y98-75-U", projectId: "aura-ai-agency" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function sync() {
            const snap = await db.collection('index_data').doc('master_data').get();
            if (snap.exists) {
                document.getElementById('site-title').innerText = snap.data().title;
                document.getElementById('site-desc').innerText = snap.data().description;
            }
        }
        window.onload = sync;
    </script>
</body>
</html>
