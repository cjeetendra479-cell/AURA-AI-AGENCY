<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | AURA AI AGENCY</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --card: #111; --accent: #7000ff; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding-top: 100px; }
        
        /* Fixed Navbar */
        .navbar { position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--neon); z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; box-sizing: border-box; backdrop-filter: blur(10px); }
        .logo { font-weight: 800; color: var(--neon); letter-spacing: 2px; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon); }
        .nav-links { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-links a { color: #888; text-decoration: none; font-size: 12px; text-transform: uppercase; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header Section */
        .header-box { text-align: center; margin-bottom: 60px; }
        #main-page-title { font-size: 3.5rem; color: var(--neon); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        #main-page-desc { color: #666; font-size: 1.1rem; max-width: 700px; margin: 15px auto; }

        /* Dynamic Grid */
        .project-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .project-card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.5s; position: relative; }
        .project-card:hover { transform: translateY(-10px); border-color: var(--neon); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.2); }
        
        .img-box { width: 100%; height: 250px; overflow: hidden; position: relative; background: #000; }
        #db-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; opacity: 0.7; }
        .project-card:hover #db-img { transform: scale(1.1); opacity: 0.4; }

        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; transition: 0.3s; z-index: 2; }
        .project-card:hover .overlay { opacity: 1; }
        .btn-action { padding: 12px 30px; background: var(--neon); color: black; text-decoration: none; font-weight: bold; border-radius: 5px; text-transform: uppercase; font-size: 0.8rem; }

        .info { padding: 30px; }
        .info h3 { font-size: 1.7rem; margin: 0; color: #fff; letter-spacing: 1px; }
        .info p { color: #888; font-size: 0.95rem; margin-top: 15px; line-height: 1.6; }
        .status-node { color: var(--accent); font-size: 10px; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }

        @media (max-width: 768px) { #main-page-title { font-size: 2.2rem; } .project-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">AURA AI</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html" class="active">Portfolio</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="admin.html">Admin</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header-box">
            <h1 id="main-page-title">OUR PORTFOLIO</h1>
            <p id="main-page-desc">Synchronizing AURA AI AGENCY deployment logs and digital assets.</p>
        </div>

        <div class="project-grid" id="portfolio-container">
            <div class="project-card">
                <div class="img-box">
                    <img id="db-img" src="https://via.placeholder.com/800x450?text=Syncing+Aura+AI..." alt="Portfolio Image">
                    <div class="overlay">
                        <a href="#" class="btn-action">View Project</a>
                    </div>
                </div>
                <div class="info">
                    <span class="status-node">Neural Node Active</span>
                    <h3 id="db-title">Establishing Link...</h3>
                    <p id="db-desc">Fetching latest project data from AURA AI central database cluster...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Aura AI Agency Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyCBk6Nz1cd4A0x7wOnLG2-eNw2Y98-75-U",
          authDomain: "aura-ai-agency.firebaseapp.com",
          projectId: "aura-ai-agency",
          storageBucket: "aura-ai-agency.appspot.com",
          messagingSenderId: "859076065133",
          appId: "1:859076065133:web:f6078dabf975bf01280c64",
          measurementId: "G-0MRWWPVZTM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadAuraPortfolio() {
            try {
                // 'portfolio_data' collection se data fetch ho raha hai
                const snapshot = await db.collection('portfolio_data').get();
                if (!snapshot.empty) {
                    const data = snapshot.docs[0].data();
                    
                    // UI Update with Firebase Data
                    if(data.title) document.getElementById('db-title').innerText = data.title;
                    if(data.description) document.getElementById('db-desc').innerText = data.description;
                    if(data.imageUrl) document.getElementById('db-img').src = data.imageUrl;
                    
                    // Page Header Update
                    if(data.pageTitle) document.getElementById('main-page-title').innerText = data.pageTitle;
                    if(data.pageDesc) document.getElementById('main-page-desc').innerText = data.pageDesc;
                }
            } catch (err) {
                console.error("Aura Sync Failed:", err);
                document.getElementById('db-title').innerText = "CONNECTION OFFLINE";
            }
        }

        window.onload = loadAuraPortfolio;
    </script>
</body>
</html>
